version: "1"
projects:
- name: Luis
  environments:
  - name: Production
    services:
    - type: web
      name: TourWeaver
      runtime: node
      repo: https://github.com/luiisrodriguez1996-sys/TourWeaver
      plan: starter
      envVars:
      - key: PORT
        sync: false
      region: virginia
      buildCommand: npm install; npm run build
      startCommand: npm run start
      autoDeployTrigger: "off"
headers:
  - path: /*
    name: X-Frame-Options
    value: DENY
  - path: /*
    name: X-Content-Type-Options
    value: nosniff
  - path: /*
    name: Referrer-Policy
    value: strict-origin-when-cross-origin
  - path: /*
    name: Permissions-Policy
    value: camera=(), microphone=(), geolocation=()

