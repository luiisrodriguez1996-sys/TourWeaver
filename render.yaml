# Configuración de despliegue optimizada para Render.com
# Incluye blindaje de infraestructura según auditoría OWASP v1.5.0
version: "1"
services:
  - type: web
    name: TourWeaver
    runtime: node
    repo: https://github.com/luiisrodriguez1996-sys/TourWaver
    plan: starter
    region: virginia
    buildCommand: npm install; npm run build
    startCommand: npm run start
    autoDeployTrigger: "off"
    envVars:
      - key: PORT
        value: 10000
    
    # ELIMINADO: sección headers — las cabeceras HTTP ahora se gestionan centralizadamente desde next.config.ts
